name: Deploy to Amazon ECS



on:
  push:
    branches:
      - main

env:
  AWS_REGION:       us-east-1
  ECR_REPOSITORY:   nodebase-app-repo
  ECS_SERVICE:      nodebase-service
  ECS_CLUSTER:      nodebase-cluster-final
  CONTAINER_NAME:   nodebase-container

jobs:
  deploy:
    name: Deploy ECS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Dependencies for Migration
        run: npm install --legacy-peer-deps

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: nodebase-app-repo  # Ensure this matches your ECR name
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}" \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --build-arg SENTRY_AUTH_TOKEN="${{ secrets.SENTRY_AUTH_TOKEN }}" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT



      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:   .aws/task-definition.json
          container-name:    ${{ env.CONTAINER_NAME }}
          image:             ${{ steps.build-image.outputs.image }}
          # All secrets injected here at deploy time — NOT baked into the image
          environment-variables: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DIRECT_URL=${{ secrets.DIRECT_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            SQS_QUEUE_URL=${{ secrets.SQS_QUEUE_URL }}
            AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}
            NODE_ENV=production
            PORT=3000
            HOSTNAME=0.0.0.0
            AUTH_TRUST_HOST=true

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-lambda:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: deploy   # only runs after ECS deploy succeeds

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Lambda Image
        id: build-image
        env:
          ECR_REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: nodebase-lambda-worker
          IMAGE_TAG:      ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f Dockerfile.lambda .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Import Existing Resources
        working-directory: ./terraform
        # Import resources already in AWS so Terraform doesn't try to recreate them.
        # || true means the step continues even if a resource is already in state.
        run: |
          terraform import aws_db_subnet_group.db_subs nodebase-db-group || true
          terraform import aws_s3_bucket.storage cloud-project-26-final || true
          terraform import aws_ecr_repository.lambda_repo nodebase-lambda-worker || true
          terraform import aws_ecr_repository.repo nodebase-app-repo || true
          terraform import aws_cloudwatch_log_group.ecs_logs /ecs/nodebase-app || true
          terraform import aws_iam_role.ecs_exec nodebase-exec-role || true
          terraform import aws_iam_role.ecs_task nodebase-task-role || true
          terraform import aws_iam_role.lambda_role nodebase-lambda-role || true
          terraform import aws_sqs_queue.queue https://sqs.us-east-1.amazonaws.com/914179697087/nodebase-notification-queue || true
        env:
          TF_VAR_aws_access_key:       ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_key:       ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password:          ${{ secrets.DB_PASSWORD }}
          TF_VAR_better_auth_secret:   ${{ secrets.BETTER_AUTH_SECRET }}
          TF_VAR_encryption_key:       ${{ secrets.ENCRYPTION_KEY }}
          TF_VAR_google_client_id:     ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_gh_client_id:         ${{ secrets.GH_CLIENT_ID }}
          TF_VAR_gh_client_secret:     ${{ secrets.GH_CLIENT_SECRET }}
          TF_VAR_openai_api_key:       ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_polar_access_token:   ${{ secrets.POLAR_ACCESS_TOKEN }}
          TF_VAR_lambda_image_tag:     ${{ github.sha }}

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -var="lambda_image_tag=${{ github.sha }}"
        env:
          TF_VAR_aws_access_key:       ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_aws_secret_key:       ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password:          ${{ secrets.DB_PASSWORD }}
          TF_VAR_better_auth_secret:   ${{ secrets.BETTER_AUTH_SECRET }}
          TF_VAR_encryption_key:       ${{ secrets.ENCRYPTION_KEY }}
          TF_VAR_google_client_id:     ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_gh_client_id:         ${{ secrets.GH_CLIENT_ID }}
          TF_VAR_gh_client_secret:     ${{ secrets.GH_CLIENT_SECRET }}
          TF_VAR_openai_api_key:       ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_polar_access_token:   ${{ secrets.POLAR_ACCESS_TOKEN }}

      - name: Update Lambda Function Code
        run: |
          aws lambda update-function-code \
            --function-name nodebase-workflow-worker-v2 \
            --image-uri ${{ steps.login-ecr.outputs.registry }}/nodebase-lambda-worker:${{ github.sha }}
